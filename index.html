<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mellanize — Claude Mellan 스타일 변환</title>
  </head>
  <body>
    <main>
      <h1>mellanize</h1>
      <p class="sub">이미지 → Claude Mellan 스타일 단일 나선 판화</p>

      <div class="controls">
        <label class="file">이미지 선택 <input type="file" id="file" accept="image/*" /></label>
        <label>모드
          <select id="mode">
            <option value="phasefield" selected>phasefield</option>
            <option value="integrate">integrate (단일 유선)</option>
            <option value="warp">warp (변위)</option>
            <option value="skeleton">skeleton (기본 나선)</option>
          </select>
        </label>
        <label>워프
          <select id="warp">
            <option value="anisotropic" selected>anisotropic (에지 따라)</option>
            <option value="tone_only">tone_only (톤만)</option>
          </select>
        </label>
        <label>전처리
          <select id="preprocess">
            <option value="luma_clahe" selected>luma+CLAHE</option>
            <option value="luma_only">luma only</option>
            <option value="user_adjust">user adjust</option>
          </select>
        </label>
        <label>입력필터
          <select id="inFilter" title="(a) 파이프라인 입력 그레이에 주파수 필터: high=미세디테일/에지, low=넓은 톤 (변환에 영향)">
            <option value="none" selected>없음</option>
            <option value="lowpass">로우패스</option>
            <option value="highpass">하이패스</option>
            <option value="bandpass">밴드패스</option>
          </select>
        </label>
        <label>α
          <select id="alpha">
            <option value="grad" selected>grad |∇I|</option>
            <option value="meanH">meanH |H|</option>
            <option value="mixed">mixed</option>
          </select>
        </label>
        <label>선방향
          <select id="lineorient" title="integrate·warp 전용">
            <option value="along" selected>along (v₂)</option>
            <option value="across">across (v₁)</option>
            <option value="switch">switch (β)</option>
          </select>
        </label>
        <label>부호
          <select id="signhandling" title="integrate·warp 전용">
            <option value="tensorblend" selected>tensorblend</option>
            <option value="spiralalign">spiralalign</option>
          </select>
        </label>
        <label>톤
          <select id="tone" title="thickness_plus_spacing: 넓은 명암은 간격, 디테일은 두께">
            <option value="thickness_only" selected>두께만</option>
            <option value="thickness_plus_spacing">두께+간격</option>
          </select>
        </label>
        <label>범위
          <select id="coverage">
            <option value="diagonal" selected>대각(전체)</option>
            <option value="fixed_turns">고정 턴수</option>
          </select>
        </label>
        <label><input type="checkbox" id="autoregen" checked /> 자동 재생성</label>
        <button id="render" type="button">Render</button>
        <label>출력
          <select id="output" title="canvas: 래스터 미리보기·PNG / SVG: 오프셋 아웃라인 폴리곤 벡터">
            <option value="canvas" selected>canvas</option>
            <option value="svg">SVG</option>
          </select>
        </label>
        <label>분석필터
          <select id="outFilter" title="(b) 변환 결과에 주파수 필터를 적용해 표시(분석용, 단일 뷰). 변환·다운로드엔 영향 없음">
            <option value="none" selected>없음</option>
            <option value="lowpass">로우패스</option>
            <option value="highpass">하이패스</option>
            <option value="bandpass">밴드패스</option>
          </select>
        </label>
        <button id="download" type="button" title="현재 출력 형식으로 저장 (canvas=PNG / SVG=벡터)">다운로드</button>
        <label>원본해상도
          <select id="origMethod" title="(b) 좌표 스케일업: 빠름·분석은 다운샘플 / (a) 재처리: 원본서 재분석·무거움">
            <option value="scale" selected>좌표 스케일업 (b)</option>
            <option value="reprocess">재처리 (a)</option>
          </select>
        </label>
        <button id="origExport" type="button" title="원본 해상도로 변환 결과 내보내기 (출력 형식 따름)">원본 해상도 내보내기</button>
      </div>

      <div class="controls" id="viewbar">
        <label>보기
          <select id="viewmode">
            <option value="single" selected>단일</option>
            <option value="compare">비교 (절취선)</option>
            <option value="quad">4분할 비교</option>
          </select>
        </label>
        <span id="compareopts" hidden>
          <label>원본
            <select id="cmpOriginal">
              <option value="color" selected>컬러</option>
              <option value="gray">그레이 (전처리 luma)</option>
            </select>
          </label>
          <label>분할
            <select id="cmpSplit">
              <option value="vertical" selected>세로 (좌 원본/우 변환)</option>
              <option value="horizontal">가로 (상 원본/하 변환)</option>
            </select>
          </label>
          <label>절취선
            <select id="cmpHandle">
              <option value="drag" selected>드래그</option>
              <option value="follow">커서 추종</option>
            </select>
          </label>
        </span>
        <span id="quadopts" hidden>
          <label class="param" id="quadResRow">패널 해상도
            <input type="range" id="quadResRange" min="128" max="1024" step="32" value="512" />
            <input type="number" id="quadResNum" min="128" max="1024" step="32" value="512" />
          </label>
          <span class="hint">패널 클릭 = 선택 · 컨트롤은 활성 패널에 적용</span>
        </span>
      </div>

      <div id="basic" class="params"></div>
      <details class="adv">
        <summary>고급 설정 (엔진 수치)</summary>
        <div id="advanced"></div>
      </details>

      <p class="hint">캔버스를 클릭하면 나선 중심을 지정합니다.</p>
      <span id="status" class="status">이미지를 선택하세요.</span>
      <span id="iqa" class="status iqa"></span>

      <canvas id="canvas"></canvas>
      <div id="quad" hidden>
        <canvas class="panel" data-panel="0"></canvas>
        <canvas class="panel" data-panel="1"></canvas>
        <canvas class="panel" data-panel="2"></canvas>
        <canvas class="panel" data-panel="3"></canvas>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
