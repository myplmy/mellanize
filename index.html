<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mellanize — Claude Mellan 스타일 변환</title>
  </head>
  <body>
    <main>
      <h1>mellanize</h1>
      <p class="sub">이미지 → Claude Mellan 스타일 단일 나선 판화</p>

      <div class="controls">
        <label class="file">이미지 선택 <input type="file" id="file" accept="image/*" /></label>
        <label>모드
          <select id="mode">
            <option value="phasefield" selected>phasefield</option>
            <option value="skeleton">skeleton (기본 나선)</option>
          </select>
        </label>
        <label>워프
          <select id="warp">
            <option value="anisotropic" selected>anisotropic (에지 따라)</option>
            <option value="tone_only">tone_only (톤만)</option>
          </select>
        </label>
        <label><input type="checkbox" id="autoregen" checked /> 자동 재생성</label>
        <button id="render" type="button">Render</button>
      </div>

      <div id="basic" class="params"></div>
      <details class="adv">
        <summary>고급 설정 (엔진 수치)</summary>
        <div id="advanced" class="params"></div>
      </details>

      <p class="hint">캔버스를 클릭하면 나선 중심을 지정합니다.</p>
      <span id="status" class="status">이미지를 선택하세요.</span>

      <canvas id="canvas"></canvas>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
