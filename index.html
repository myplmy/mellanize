<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mellanize — Claude Mellan 스타일 변환</title>
  </head>
  <body>
    <main>
      <h1>mellanize</h1>
      <p class="sub">이미지 → Claude Mellan 스타일 단일 나선 판화</p>

      <div class="controls">
        <label class="file">이미지 선택 <input type="file" id="file" accept="image/*" /></label>
        <label>모드
          <select id="mode">
            <option value="phasefield" selected>phasefield</option>
            <option value="integrate">integrate (단일 유선)</option>
            <option value="warp">warp (변위)</option>
            <option value="skeleton">skeleton (기본 나선)</option>
          </select>
        </label>
        <label>워프
          <select id="warp">
            <option value="anisotropic" selected>anisotropic (에지 따라)</option>
            <option value="tone_only">tone_only (톤만)</option>
          </select>
        </label>
        <label>전처리
          <select id="preprocess">
            <option value="luma_clahe" selected>luma+CLAHE</option>
            <option value="luma_only">luma only</option>
            <option value="user_adjust">user adjust</option>
          </select>
        </label>
        <label>α
          <select id="alpha">
            <option value="grad" selected>grad |∇I|</option>
            <option value="meanH">meanH |H|</option>
            <option value="mixed">mixed</option>
          </select>
        </label>
        <label>선방향
          <select id="lineorient" title="integrate·warp 전용">
            <option value="along" selected>along (v₂)</option>
            <option value="across">across (v₁)</option>
            <option value="switch">switch (β)</option>
          </select>
        </label>
        <label>부호
          <select id="signhandling" title="integrate·warp 전용">
            <option value="tensorblend" selected>tensorblend</option>
            <option value="spiralalign">spiralalign</option>
          </select>
        </label>
        <label>톤
          <select id="tone" title="thickness_plus_spacing: 넓은 명암은 간격, 디테일은 두께">
            <option value="thickness_only" selected>두께만</option>
            <option value="thickness_plus_spacing">두께+간격</option>
          </select>
        </label>
        <label>범위
          <select id="coverage">
            <option value="diagonal" selected>대각(전체)</option>
            <option value="fixed_turns">고정 턴수</option>
          </select>
        </label>
        <label><input type="checkbox" id="autoregen" checked /> 자동 재생성</label>
        <button id="render" type="button">Render</button>
      </div>

      <div id="basic" class="params"></div>
      <details class="adv">
        <summary>고급 설정 (엔진 수치)</summary>
        <div id="advanced"></div>
      </details>

      <p class="hint">캔버스를 클릭하면 나선 중심을 지정합니다.</p>
      <span id="status" class="status">이미지를 선택하세요.</span>

      <canvas id="canvas"></canvas>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
